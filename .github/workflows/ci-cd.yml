# .github/workflows/ci-cd.yml
# Automated CI/CD Pipeline for Web Application Deployment

name: CI/CD Pipeline

# ============================================
# TRIGGERS: When should this pipeline run?
# ============================================
on:
  # Run on push to main branch
  push:
    branches: [main]

  # Run on pull requests targeting main
  pull_request:
    branches: [main]

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# ============================================
# ENVIRONMENT VARIABLES (available to all jobs)
# ============================================
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-webapp
  DOCKER_TAG: sha-${{ github.sha }}
  NODE_VERSION: "20"

# ============================================
# JOBS: The work units of the pipeline
# ============================================
jobs:
  # ------------------------------------------
  # JOB 1: Build, Lint, and Test
  # ------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm" # Cache npm dependencies for faster builds

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci
        # npm ci = clean install from lockfile (faster, deterministic)

      # Step 4: Run linter
      - name: Run ESLint
        run: npm run lint

      # Step 5: Run tests with coverage
      - name: Run tests
        run: npm test

      # Step 6: Upload test coverage as artifact
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always() # Upload even if tests fail
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ------------------------------------------
  # JOB 2: Build and Push Docker Image
  # ------------------------------------------
  build-and-push-docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test # Only run if tests pass

    # Only build Docker image on push to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Step 1: Check out code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (advanced builder)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Extract metadata (tags, labels)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ env.DOCKER_TAG }}
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      # Step 5: Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # Use GitHub Actions cache
          cache-to: type=gha,mode=max

      # Step 6: Verify the pushed image
      - name: Verify image
        run: |
          echo "Image pushed successfully!"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  deploy-to-azure:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-push-docker

    # Only deploy on push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Step 1: Login to Azure using a service principal secret
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 2: Configure Azure Web App container settings for Docker Hub
      - name: Configure Web App container image
        uses: azure/CLI@v2
        env:
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          inlineScript: |
            az webapp config container set \
              --name "$AZURE_WEBAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --container-image-name "${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}" \
              --container-registry-url "https://index.docker.io" \
              --container-registry-user "$DOCKERHUB_USERNAME" \
              --container-registry-password "$DOCKERHUB_TOKEN"

            az webapp config appsettings set \
              --name "$AZURE_WEBAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --settings WEBSITES_PORT=3000

            az webapp restart \
              --name "$AZURE_WEBAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP"

      # Step 3: Wait for deployment to stabilize
      - name: Wait for deployment
        run: |
          echo "Waiting for Azure App Service to pull and start the new container..."
          sleep 30

      # Step 4: Verify deployment via health check
      - name: Verify deployment
        run: |
          echo "Checking health endpoint..."
          HEALTH_URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
          
          # Try up to 5 times with 10-second intervals
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5: Checking $HEALTH_URL"
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            
            if [ "$HTTP_STATUS" = "200" ]; then
              echo ""
              echo "========================================="
              echo "   DEPLOYMENT SUCCESSFUL"
              echo "   URL: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
              echo "   Health: $HEALTH_URL"
              echo "   Status: HTTP $HTTP_STATUS"
              echo "========================================="
              curl -s "$HEALTH_URL" | python3 -m json.tool || true
              exit 0
            fi
            
            echo "   Got HTTP $HTTP_STATUS, retrying in 10s..."
            sleep 10
          done
          
          echo ""
          echo "Health check did not return 200 after 5 attempts."
          echo "   This may be normal for first deployment (container is still starting)."
          echo "   Check manually: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
          echo "   Check logs in Azure Portal → App Service → Log stream"