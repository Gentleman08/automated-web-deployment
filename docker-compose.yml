# docker-compose.yml
# Local development and testing with Docker Compose
# Usage: docker compose up --build

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
      target: production        # Skip the builder/test stage for faster local builds
    container_name: cicd-webapp
    ports:
      - "3000:3000"             # Map host port 3000 → container port 3000
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped     # Auto-restart on crash (matches CI/CD deploy config)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
